<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>启动中…</title>
    <style>
      :root { color-scheme: light; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        background: radial-gradient(1200px 400px at 50% -150px, rgba(37, 99, 235, 0.20), transparent 60%),
          linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
      }
      .card {
        width: 462px;
        padding: 22px 24px 18px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 18px 60px rgba(2, 6, 23, 0.12);
        border: 1px solid rgba(148, 163, 184, 0.35);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .logo {
        width: 76px;
        height: 76px;
        border-radius: 16px;
        margin: 0 auto 14px;
        display: grid;
        place-items: center;
        background: #2563eb;
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.25);
      }
      .logo img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        border-radius: 18px;
      }
      .title {
        font-size: 22px;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: 0.2px;
        margin: 0 0 10px;
        text-align: center;
      }
      .subtitle {
        font-size: 13px;
        line-height: 1.7;
        color: #475569;
        margin: 0 0 18px;
        text-align: center;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-top: 1px solid #e2e8f0;
        padding-top: 12px;
      }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(37, 99, 235, 0.25);
        border-top-color: rgba(37, 99, 235, 0.95);
        border-radius: 999px;
        animation: spin 1s linear infinite;
      }
      .hint { font-size: 12px; color: #64748b; }
      .status { display: flex; align-items: center; gap: 9px; }
      .org { font-size: 11px; color: #94a3b8; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo" aria-hidden="true">
        <img id="appIcon" alt="" />
        <svg id="fallbackMark" width="42" height="42" viewBox="0 0 44 44" fill="none">
          <path d="M16.3 29V15.1H24.9V17.7H19.4V20.8H24.3V23.3H19.4V29H16.3Z" fill="white"/>
          <path d="M26.4 29V15.1H29.5V26.4H34.9V29H26.4Z" fill="white"/>
        </svg>
      </div>
      <p class="title" id="appName">长沙院冶金智能配料软件</p>
      <p class="subtitle" id="appSubtitle">
        面向有色冶炼配料计算、渣型控制和物料平衡的专业工程工具。支持原料、熔剂、物相和阶段流程的本地化计算与复核。
      </p>
      <div class="row">
        <div class="status">
          <div class="spinner" aria-hidden="true"></div>
          <div class="hint">正在加载计算模块与本地服务…</div>
        </div>
        <div class="org">CINF</div>
      </div>
    </div>
    <script>
      (function () {
        try {
          var params = new URLSearchParams(location.search || '');
          var icon = params.get('iconPng') || params.get('icon') || '';
          var name = params.get('name') || '';
          var tagline = params.get('tagline') || '';
          var iconEl = document.getElementById('appIcon');
          var fallback = document.getElementById('fallbackMark');
          var nameEl = document.getElementById('appName');
          var subEl = document.getElementById('appSubtitle');
          if (name && nameEl) nameEl.textContent = name;
          if (tagline && subEl) subEl.textContent = tagline;
          if (icon && iconEl) {
            iconEl.src = icon;
            iconEl.onload = function () { if (fallback) fallback.style.display = 'none'; };
            iconEl.onerror = function () { if (fallback) fallback.style.display = ''; };
          } else {
            if (iconEl) iconEl.style.display = 'none';
          }
        } catch (_) {}
      })();
    </script>
  </body>
</html>
